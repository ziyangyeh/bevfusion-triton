# @package _global_
defaults:
  - _self_

optimizer:
  type: AdamW
  lr: 0.0002
  weight_decay: 0.01

lr_config:
  policy: CosineAnnealing
  warmup: linear
  warmup_iters: 500
  warmup_ratio: 0.33333333
  min_lr_ratio: 1.0e-3

optimizer_config:
  grad_clip:
    max_norm: 35
    norm_type: 2

momentum_config:
  policy: cyclic
